<script>
  const form = document.getElementById('accessForm');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const projectUnit = document.getElementById('projectUnit').value.trim();
    const budget = document.getElementById('budget').value.trim();
    const message = document.getElementById('message').value.trim();

    const subject = encodeURIComponent(`SSGPT6 Access Request - ${projectUnit || 'General Inquiry'}`);
    const body = encodeURIComponent(
`Full Name: ${fullName}
Email: ${email}
Project / Unit: ${projectUnit}
Budget Range: ${budget}

Request Details:
${message}`
    );

    window.location.href = `mailto:ssgpt6@aol.com?subject=${subject}&body=${body}`;

    setTimeout(() => {
      window.location.href = '/success.html';
    }, 800);
  });
</script>
