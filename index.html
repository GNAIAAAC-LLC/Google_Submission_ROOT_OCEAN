<script>
    // GHOST TRIGGER: The Secret Link Logic
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // If the URL contains ?access=root, show the login box
        if (urlParams.get('access') === 'root') {
            document.getElementById('admin-gate').classList.remove('hidden');
            // Clean the URL so nobody else sees the 'root' tag if they look at your phone
            window.history.replaceState({}, document.title, "/");
        }
    };

    function verifyRoot() {
        const key = document.getElementById('master-key').value;
        if (key === 'SHANTA-2026') { 
            localStorage.setItem('root_access', 'true');
            alert('CITADEL UNLOCKED');
            location.href = "/"; // Refresh to show admin dashboard
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
        }
    }
</script>
