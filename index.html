<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSGPT6 | Project Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SSGPT6 Marketplace</h1>
        <p>Explore our 135+ AI & Automation Solutions</p>
        <input type="text" id="projectSearch" onkeyup="searchProjects()" placeholder="Search projects (e.g. 'Energy', 'SaaS', 'AI')...">
    </header>

    <div id="projects-container">
        </div>

    <script>
        /** * This function filters the 135 projects in real-time.
         * It looks at the title and description of each project 
         * and hides those that don't match your search.
         */
        function searchProjects() {
            let input = document.getElementById('projectSearch').value.toLowerCase();
            let sections = document.getElementsByClassName('section');
            
            for (let i = 0; i < sections.length; i++) {
                let text = sections[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    sections[i].style.display = "";
                } else {
                    sections[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
