<script>
    // 1. MOBILE-FIRST HANDSHAKE
    function bootCitadel() {
        const params = new URLSearchParams(window.location.search);
        
        // Detect "root" in URL for iPhone/iPad reliability
        if (params.has('access') && params.get('access') === 'root') {
            const gate = document.getElementById('admin-gate');
            const input = document.getElementById('master-key');
            
            if (gate) {
                gate.classList.remove('hidden');
                // iPhone Keyboard Fix: Delay focus slightly so the OS allows the popup
                setTimeout(() => {
                    input.focus();
                    input.click(); // Extra "click" force for iPadOS
                }, 400);
            }
            
            // Ghost Cleanup: Wipe the URL so the secret stays secret
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    // 2. APPLE COMPATIBILITY LAYER
    // iOS Safari sometimes skips window.onload. We use this "ReadyState" check instead.
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        bootCitadel();
    } else {
        document.addEventListener('DOMContentLoaded', bootCitadel);
    }

    // 3. MASTER KEY VERIFICATION
    function verifyRoot() {
        const key = document.getElementById('master-key').value;
        const errorMsg = document.getElementById('error-msg');
        
        if (key === 'SHANTA-2026') { 
            // Secure Local Storage for Persistent Login
            localStorage.setItem('ssgpt6_root', 'true');
            alert('CITADEL UNLOCKED');
            
            // Force a Hard Refresh to bypass Apple's "Back-Forward Cache"
            window.location.href = window.location.origin + window.location.pathname + '?auth=success';
        } else {
            errorMsg.classList.remove('hidden');
            // Haptic Feedback Simulation (Visual Shake)
            const box = document.querySelector('#admin-gate > div');
            box.style.transform = 'translateX(10px)';
            setTimeout(() => box.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => box.style.transform = 'translateX(0)', 100);
        }
    }
</script>
