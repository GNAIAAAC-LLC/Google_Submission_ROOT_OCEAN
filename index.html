<!DOCTYPE html>
<html>
<head>
  <title>SSGPT6</title>
</head>

<body style="margin:0; font-family:Arial;">

  <!-- HOME PAGE -->
  <div id="home" style="
    text-align:center;
    padding:50px;
    background:#0b1a2f;
    color:white;
    min-height:100vh;
  ">

    <h1 style="font-size:40px; color:gold;">SSGPT6</h1>

    <p style="font-size:18px; margin-top:20px;">
      Intelligent Digital Access Platform
    </p>

    <button onclick="showDashboard()" style="
      margin-top:40px;
      padding:12px 25px;
      background:gold;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    ">
      Enter Dashboard
    </button>

  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard" style="
    display:none;
    text-align:center;
    padding:50px;
    background:#0b1a2f;
    color:white;
    min-height:100vh;
  ">

    <h1 style="color:gold;">SSGPT6 Dashboard</h1>

    <p>Welcome to your system</p>

    <div style="margin-top:30px;">

      <div style="
        background:#122a45;
        padding:20px;
        margin:10px;
        border-radius:10px;
      ">
        System Status: Active
      </div>

      <div style="
        background:#122a45;
        padding:20px;
        margin:10px;
        border-radius:10px;
      ">
        Users: 0
      </div>

      <div style="
        background:#122a45;
        padding:20px;
        margin:10px;
        border-radius:10px;
      ">
        Services: Ready
      </div>

    </div>

    <button onclick="showHome()" style="
      margin-top:30px;
      padding:10px 20px;
      background:gold;
      border:none;
      border-radius:8px;
      cursor:pointer;
    ">
      Back Home
    </button>

  </div>

  <!-- SCRIPT -->
  <script>
    function showDashboard() {
      document.getElementById("home").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
    }

    function showHome() {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("home").style.display = "block";
    }
  </script>

</body>
</html>
