<!-- SCRIPT -->
<script>
const API_KEY = "ZD88CFMC438XC7Q8";

// SAFE FETCH FUNCTION
async function loadStock(symbol, elementId, statusId) {
  try {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
      document.getElementById(elementId).innerText =
        "$" + data["Global Quote"]["05. price"];
      document.getElementById(statusId).innerText = "Live";
    } else {
      throw new Error();
    }

  } catch {
    document.getElementById(elementId).innerText = "$Demo";
    document.getElementById(statusId).innerText = "Safe Mode";
  }
}

// LOAD ALL
loadStock("AAPL", "aapl", "aapl-status");
loadStock("TSLA", "tsla", "tsla-status");

// BTC (fallback demo since AlphaVantage crypto limited)
document.getElementById("btc").innerText = "$Demo";
document.getElementById("btc-status").innerText = "Safe Mode";

</script>
