<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;background:#07111f;color:white;">

<!-- HEADER -->
<div style="text-align:center;padding:25px;background:#0c1b31;">
<h1 style="color:gold;">GN-AI Market Terminal</h1>
<p>Educational • Protected • No Trading</p>
</div>

<!-- WARNING -->
<div style="background:#8b0000;text-align:center;padding:12px;">
⚠️ NO TRADING — Intelligence Only
</div>

<!-- GRID -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;">

<!-- CARD -->
<div style="background:#132b4a;padding:20px;border-radius:12px;text-align:center;">
<h2>Apple</h2>
<p id="aapl-price">Loading...</p>
<p id="aapl-signal"></p>
</div>

<div style="background:#132b4a;padding:20px;border-radius:12px;text-align:center;">
<h2>Tesla</h2>
<p id="tsla-price">Loading...</p>
<p id="tsla-signal"></p>
</div>

<div style="background:#132b4a;padding:20px;border-radius:12px;text-align:center;">
<h2>Bitcoin</h2>
<p id="btc-price">$Demo</p>
<p id="btc-signal">🟡 Watch</p>
</div>

</div>

<!-- MARKET PANEL -->
<div style="padding:20px;text-align:center;">
<h2 style="color:gold;">GN-AI Insight Panel</h2>
<p id="global-signal">Analyzing global market...</p>
</div>

<script>
const API_KEY = "ZD88CFMC438XC7Q8";

// LOAD STOCK
async function load(symbol, priceId, signalId) {
  try {
    const res = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`);
    const data = await res.json();

    if (data["Global Quote"] && data["Global Quote"]["05. price"]) {
      const price = parseFloat(data["Global Quote"]["05. price"]);

      document.getElementById(priceId).innerText = "$" + price;

      // SIGNAL LOGIC
      if (price > 200) {
        document.getElementById(signalId).innerText = "🟢 Stable";
      } else if (price > 150) {
        document.getElementById(signalId).innerText = "🟡 Watch";
      } else {
        document.getElementById(signalId).innerText = "🔴 Risk";
      }

    } else throw new Error();

  } catch {
    document.getElementById(priceId).innerText = "$Demo";
    document.getElementById(signalId).innerText = "🟡 Safe Mode";
  }
}

// LOAD DATA
load("AAPL", "aapl-price", "aapl-signal");
load("TSLA", "tsla-price", "tsla-signal");

// GLOBAL SIGNAL
document.getElementById("global-signal").innerText =
"Market Condition: 🟢 Stable • Volatility Low • Sentiment Neutral";

</script>

</body>
</html>
