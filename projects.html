<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSGPT6 | 135 Project Matrix</title>
    <style>
        :root { --bg: #010409; --gold: #d4af37; --line: rgba(212, 175, 55, 0.2); }
        body { background: var(--bg); color: #fff; font-family: Arial, sans-serif; padding: 50px 0; }
        .container { width: min(94%, 1200px); margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { border: 1px solid var(--line); padding: 30px; background: #0c1728; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card h3 { color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        .search { width: 100%; padding: 20px; background: #000; border: 1px solid var(--gold); color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color:var(--gold); text-decoration:none;">← BACK TO UN HUB</a>
        <h1 style="color:var(--gold); font-size: 3rem; margin: 30px 0;">135 PROJECT LEDGER</h1>
        <input type="text" class="search" placeholder="Search 135 Projects (e.g. 'Water', 'Energy', 'Medicine')...">
        <div class="grid">
            <div class="card"><h3>Pharma Vault</h3><p>$75M Royalty Stream Management</p></div>
            <div class="card"><h3>Water-AI</h3><p>Hydrol-Stasis Monitoring System</p></div>
            <div class="card"><h3>Zero-Carbon Mesh</h3><p>Distributed Energy Sovereignty</p></div>
            <div class="card"><h3>Mars Seed-Ship</h3><p>Interstellar Logistics Protocol</p></div>
        </div>
    </div>
</body>
</html>
